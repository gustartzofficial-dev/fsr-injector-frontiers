name: Build Windows DLL

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --target fsr_proxy

      - name: Collect dxgi.dll
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifact
          Copy-Item build/Release/dxgi.dll artifact/dxgi.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fsr-injector-dxgi-dll
          path: artifact/dxgi.dll
